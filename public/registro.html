<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Desk Inteligente — Crear cuenta</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>🎫 Crear cuenta</h1>
    <p class="subtitulo">Elige tu rol dentro del Help Desk</p>

    <form id="formRegistro">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre" required>

      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="tu@correo.com" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">

      <label for="rol">Rol</label>
      <select id="rol" required>
        <option value="empleado">Empleado — crea y da seguimiento a sus tickets</option>
        <option value="tecnico">Técnico — recibe y resuelve los tickets</option>
        <option value="gerente">Gerente — supervisa todo el sistema</option>
      </select>

      <button type="submit" id="btnRegistro">Crear cuenta</button>
    </form>

    <div class="mensaje" id="mensaje"></div>

    <p class="auth-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </div>
</div>

<script src="auth.js"></script>
<script>
document.getElementById('formRegistro').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnRegistro');
  const msg = document.getElementById('mensaje');

  const payload = {
    nombre: document.getElementById('nombre').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    rol: document.getElementById('rol').value
  };

  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';
  msg.className = 'mensaje';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al crear la cuenta');

    guardarSesion(data.token, data.usuario);
    window.location.href = paginaPorRol(data.usuario.rol);
  } catch (err) {
    msg.className = 'mensaje error';
    msg.textContent = '❌ ' + err.message;
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  }
});
</script>

</body>
</html>
