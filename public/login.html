<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Desk Inteligente — Iniciar sesión</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>🎫 Help Desk Inteligente</h1>
    <p class="subtitulo">Inicia sesión para continuar</p>

    <form id="formLogin">
      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="tu@correo.com" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit" id="btnLogin">Iniciar sesión</button>
    </form>

    <div class="mensaje" id="mensaje"></div>

    <p class="auth-link">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
  </div>
</div>

<script src="auth.js"></script>
<script>
// Si ya hay sesión activa, redirige directo a su página según el rol
(function () {
  const usuario = obtenerUsuario();
  if (usuario && obtenerToken()) {
    window.location.href = paginaPorRol(usuario.rol);
  }
})();

document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const msg = document.getElementById('mensaje');

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  msg.className = 'mensaje';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

    guardarSesion(data.token, data.usuario);
    window.location.href = paginaPorRol(data.usuario.rol);
  } catch (err) {
    msg.className = 'mensaje error';
    msg.textContent = '❌ ' + err.message;
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
});
</script>

</body>
</html>
