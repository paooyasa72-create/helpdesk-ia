<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Help Desk Inteligente — Mis Tickets</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar-container"></div>

<main>
  <h1>Crear un ticket de soporte</h1>
  <p class="subtitulo">Usuarios crean y rastrean solicitudes de soporte. Gemini clasifica y prioriza cada ticket — y hasta responde las preguntas fáciles solito.</p>

  <div class="panel terminal-box">
    <div class="terminal-header">📝 CREAR TICKET</div>
    <form id="formTicket">
      <label for="titulo">Título:</label>
      <input type="text" id="titulo" placeholder="________________" required>

      <label for="descripcion">Descripción:</label>
      <textarea id="descripcion" placeholder="________________" required></textarea>

      <label for="prioridad">Prioridad:</label>
      <select id="prioridad">
        <option value="normal">[Normal ▾]</option>
        <option value="baja">[Baja ▾]</option>
        <option value="alta">[Alta ▾]</option>
        <option value="urgente">[Urgente ▾]</option>
      </select>

      <button type="submit" id="btnEnviar">🚀 Enviar Ticket</button>
    </form>
    <div class="mensaje" id="mensajeCrear"></div>
  </div>

  <div class="fila-top" style="display:flex; justify-content:space-between; align-items:center; margin-top:36px;">
    <div>
      <h1 style="margin-bottom:4px;">Mis tickets</h1>
      <p class="subtitulo" style="margin-bottom:0;">Aquí puedes ver el estado y las respuestas del técnico.</p>
    </div>
    <button id="btnActualizar" style="margin:0;" onclick="cargarMisTickets()">🔄 Actualizar Mis Tickets</button>
  </div>
  <div class="panel" id="listaMisTickets">
    <p class="vacio">Cargando...</p>
  </div>
</main>

<script src="auth.js"></script>
<script src="script.js"></script>
<script>
const usuario = protegerPagina(['empleado']);
if (usuario) {
  renderTopbar('empleado.html');
  cargarMisTickets();
}

document.getElementById('formTicket').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnEnviar');
  const msg = document.getElementById('mensajeCrear');

  const payload = {
    titulo: document.getElementById('titulo').value,
    descripcion: document.getElementById('descripcion').value,
    prioridad: document.getElementById('prioridad').value
  };

  btn.disabled = true;
  btn.textContent = 'Enviando...';
  msg.className = 'mensaje';

  try {
    const data = await authFetch('/api/tickets', { method: 'POST', body: JSON.stringify(payload) });
    msg.className = 'mensaje exito';
    let html = `✅ ${data.mensaje}`;
    if (data.clasificacion) {
      html += `<br>Prioridad confirmada por IA: <span class="badge ${data.clasificacion.prioridad}">${data.clasificacion.prioridad}</span> · Categoría: <b>${data.clasificacion.categoria}</b>`;
    }
    if (data.trello) {
      html += `<br>📋 Tarjeta creada en Trello: <a class="trello-link" href="${data.trello}" target="_blank">${data.trello}</a>`;
    }
    msg.innerHTML = html;
    e.target.reset();
    cargarMisTickets();
  } catch (err) {
    msg.className = 'mensaje error';
    msg.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 Enviar Ticket';
  }
});

async function cargarMisTickets() {
  const cont = document.getElementById('listaMisTickets');
  cont.innerHTML = '<p class="vacio">Cargando...</p>';
  try {
    const tickets = await authFetch('/api/tickets/mine');
    console.log('Mis tickets:', tickets);

    if (tickets.length === 0) {
      cont.innerHTML = '<p class="vacio">Todavía no has creado ningún ticket.</p>';
      return;
    }

    cont.innerHTML = tickets.map(t => {
      const respuestasTecnico = (t.mensajes || []).filter(m => m.rol === 'tecnico' || m.rol === 'gerente');
      const misMensajes = (t.mensajes || []).filter(m => m.rol === 'empleado');

      return `
      <div class="ticket-card">
        <div class="fila-top">
          <h3>${t.titulo}</h3>
          <span class="badge ${t.clasificacion?.prioridad || t.prioridad}">${t.clasificacion?.prioridad || t.prioridad}</span>
        </div>
        <p class="desc">${t.descripcion}</p>
        <p style="font-size:0.8rem; color:var(--texto-tenue);">Estado: <b>${t.estado}</b> · Creado: ${formatoFecha(t.creado)}</p>

        ${respuestasTecnico.length > 0 ? `
          <div style="margin-top:12px;">
            <p style="font-size:0.78rem; color:var(--ambar); font-weight:700; text-transform:uppercase; margin-bottom:6px;">💬 Respuesta del técnico</p>
            <div class="hilo-mensajes">
              ${respuestasTecnico.map(m => `
                <div class="mensaje-item" style="border-color: var(--ambar);">
                  <div class="meta">${m.autor} · ${formatoFecha(m.fecha)}</div>
                  ${m.texto}
                </div>
              `).join('')}
            </div>
          </div>
        ` : `<p style="font-size:0.8rem; color:var(--texto-tenue); margin-top:10px;">Todavía no hay respuesta del técnico.</p>`}

        ${misMensajes.length > 0 ? `
          <div class="hilo-mensajes" style="margin-top:8px;">
            ${misMensajes.map(m => `
              <div class="mensaje-item">
                <div class="meta">Tú · ${formatoFecha(m.fecha)}</div>
                ${m.texto}
              </div>
            `).join('')}
          </div>
        ` : ''}

        <div class="acciones">
          <input type="text" placeholder="Escribe un mensaje al técnico..." id="msg-${t._id}" style="flex:1; min-width:180px;">
          <button class="btn-secundario" onclick="enviarMensaje('${t._id}')">Enviar mensaje</button>
        </div>
      </div>
    `;
    }).join('');
  } catch (err) {
    console.error('Error al cargar mis tickets:', err);
    cont.innerHTML = `<p class="vacio">❌ ${err.message}</p>`;
  }
}

async function enviarMensaje(ticketId) {
  const input = document.getElementById(`msg-${ticketId}`);
  const texto = input.value.trim();
  if (!texto) return;

  try {
    await authFetch(`/api/tickets/${ticketId}/mensajes`, { method: 'POST', body: JSON.stringify({ texto }) });
    input.value = '';
    cargarMisTickets();
  } catch (err) {
    console.error('Error al enviar mensaje:', err);
    alert('Error: ' + err.message);
  }
}
</script>

</body>
</html>
